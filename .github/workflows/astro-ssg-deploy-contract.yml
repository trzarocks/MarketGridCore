name: Astro SSG Deploy Contract

on:
  pull_request:
    paths:
      - 'apps/astro-ssg-thin-slice/**'
      - 'docs/deployment/astro-ssg-deployment-contract.md'
      - 'docs/deployment/astro-thin-slice-workflow.md'
      - 'docs/runtime/rendering/astro-route-generation-contract.md'
      - 'docs/validators/astro-deployment-validation.md'
      - '.github/workflows/astro-ssg-deploy-contract.yml'
  workflow_dispatch:
    inputs:
      deploy_preview:
        description: 'Run preview deploy job'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  deployments: write

concurrency:
  group: astro-ssg-deploy-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contract-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/astro-ssg-thin-slice
    outputs:
      preview_required: ${{ steps.preview_required.outputs.required }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/astro-ssg-thin-slice/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate snapshot contract
        run: npm run validate:data

      - name: Validate route contract
        run: npm run validate:routes

      - name: Build static site
        run: npm run build

      - name: Inspect built route outputs
        run: npm run build:inspect

      - name: Generate sitemap artifact
        run: npm run generate:sitemap

      - name: Verify expected deployment artifacts
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/maryland/index.html
          test -f dist/maryland/baltimore-county/towson/index.html
          test -f dist/maryland/baltimore-county/towson/business-directory/restaurants/index.html
          test -f dist/maryland/baltimore-county/towson/business-directory/restaurants/banditos-bar-and-kitchen/index.html
          test -f dist/sitemap.xml

      - name: Determine preview requirement
        id: preview_required
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "required=${{ github.event.inputs.deploy_preview }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.ref }}"
          if git diff --name-only "origin/${{ github.event.pull_request.base.ref }}...HEAD" | grep -Eq '^(apps/astro-ssg-thin-slice/src/data/thin-slice\.json|apps/astro-ssg-thin-slice/src/pages/)'; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          else
            echo "required=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload validated dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-ssg-dist-${{ github.sha }}
          path: apps/astro-ssg-thin-slice/dist
          if-no-files-found: error

      - name: Upload snapshot input artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-ssg-snapshot-${{ github.sha }}
          path: apps/astro-ssg-thin-slice/src/data/thin-slice.json
          if-no-files-found: error

  preview-deploy:
    runs-on: ubuntu-latest
    needs: contract-check
    if: ${{ needs.contract-check.outputs.preview_required == 'true' }}
    environment:
      name: astro-ssg-preview
    defaults:
      run:
        working-directory: apps/astro-ssg-thin-slice
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for Wrangler
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download validated dist artifact
        uses: actions/download-artifact@v4
        with:
          name: astro-ssg-dist-${{ github.sha }}
          path: apps/astro-ssg-thin-slice/dist

      - name: Assert Cloudflare preview config
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${CF_API_TOKEN}" ]; then
            echo "Missing required secret: CLOUDFLARE_API_TOKEN"
            missing=1
          fi
          if [ -z "${CF_ACCOUNT_ID}" ]; then
            echo "Missing required secret: CLOUDFLARE_ACCOUNT_ID"
            missing=1
          fi
          if [ -z "${CF_PROJECT_NAME}" ]; then
            echo "Missing required variable: CLOUDFLARE_PAGES_PROJECT"
            missing=1
          fi
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Preflight Cloudflare Pages access
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          set -euo pipefail
          echo "Configured project name: ${CF_PROJECT_NAME}"
          echo "Checking Pages project lookup under configured account..."
          PROJECT_LIST_OUTPUT="$(npx wrangler@3.114.12 pages project list 2>&1)"
          printf "%s\n" "${PROJECT_LIST_OUTPUT}" | tee project-list-output.txt
          CLEAN_PROJECT_LIST="$(printf "%s\n" "${PROJECT_LIST_OUTPUT}" | sed -E 's/\x1B\\[[0-9;]*[A-Za-z]//g')"
          if ! printf "%s\n" "${CLEAN_PROJECT_LIST}" | grep -Eq "(^|[[:space:]])${CF_PROJECT_NAME}([[:space:]]|$)"; then
            echo "Configured CLOUDFLARE_PAGES_PROJECT was not found in this account."
            echo "Expected project: ${CF_PROJECT_NAME}"
            echo "Set CLOUDFLARE_PAGES_PROJECT to an existing Cloudflare Pages project name for account ${CLOUDFLARE_ACCOUNT_ID}."
            exit 1
          fi

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/astro-ssg-thin-slice
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }}

      - name: Print deploy output diagnostics
        if: ${{ always() }}
        run: |
          {
            echo "deployment-url=${{ steps.deploy.outputs.deployment-url }}"
            echo "pages-deployment-alias-url=${{ steps.deploy.outputs.pages-deployment-alias-url }}"
            echo "command-output=${{ steps.deploy.outputs.command-output }}"
            echo "command-stderr=${{ steps.deploy.outputs.command-stderr }}"
          } | tee deploy-output.txt

      - name: Upload preview deployment debug output
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: astro-ssg-preview-debug-${{ github.sha }}
          path: |
            apps/astro-ssg-thin-slice/deploy-output.txt
            apps/astro-ssg-thin-slice/project-list-output.txt
          if-no-files-found: ignore

      - name: Write deployment evidence
        if: ${{ always() }}
        run: |
          {
            echo "preview_url=${{ steps.deploy.outputs.deployment-url }}"
            echo "preview_alias=${{ steps.deploy.outputs.pages-deployment-alias-url }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
          } > deployment-evidence.txt

      - name: Upload preview deployment evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: astro-ssg-preview-evidence-${{ github.sha }}
          path: apps/astro-ssg-thin-slice/deployment-evidence.txt
          if-no-files-found: error

      - name: Publish preview summary
        run: |
          PREVIEW_URL="$(sed -n 's/^preview_url=//p' deployment-evidence.txt | head -n 1)"
          PREVIEW_ALIAS="$(sed -n 's/^preview_alias=//p' deployment-evidence.txt | head -n 1)"
          {
            echo "## Astro SSG Preview Deployment"
            echo ""
            echo "- Preview URL: ${PREVIEW_URL}"
            echo "- Preview Alias: ${PREVIEW_ALIAS}"
            echo "- Source SHA: ${GITHUB_SHA}"
            echo "- Wrangler Action: cloudflare/wrangler-action@v3"
          } >> "$GITHUB_STEP_SUMMARY"
