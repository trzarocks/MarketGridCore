name: Astro SSG Deploy Contract

on:
  pull_request:
    paths:
      - 'apps/astro-ssg-thin-slice/**'
      - 'docs/deployment/astro-ssg-deployment-contract.md'
      - 'docs/deployment/astro-thin-slice-workflow.md'
      - 'docs/runtime/rendering/astro-route-generation-contract.md'
      - 'docs/validators/astro-deployment-validation.md'
      - '.github/workflows/astro-ssg-deploy-contract.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: astro-ssg-deploy-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contract-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/astro-ssg-thin-slice
    outputs:
      preview_required: ${{ steps.preview_required.outputs.required }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/astro-ssg-thin-slice/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate snapshot contract
        run: npm run validate:data

      - name: Validate route contract
        run: npm run validate:routes

      - name: Build static site
        run: npm run build

      - name: Inspect built route outputs
        run: npm run build:inspect

      - name: Generate sitemap artifact
        run: npm run generate:sitemap

      - name: Verify expected deployment artifacts
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/maryland/index.html
          test -f dist/maryland/towson-md/index.html
          test -f dist/maryland/towson-md/business-directory/restaurants/index.html
          test -f dist/maryland/towson-md/business-directory/restaurants/banditos-bar-and-kitchen/index.html
          test -f dist/sitemap.xml

      - name: Determine preview requirement
        id: preview_required
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "required=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.ref }}"
          if git diff --name-only "origin/${{ github.event.pull_request.base.ref }}...HEAD" | grep -Eq '^(apps/astro-ssg-thin-slice/src/data/thin-slice\.json|apps/astro-ssg-thin-slice/src/pages/)'; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          else
            echo "required=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload validated dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-ssg-dist-${{ github.sha }}
          path: apps/astro-ssg-thin-slice/dist
          if-no-files-found: error

      - name: Upload snapshot input artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-ssg-snapshot-${{ github.sha }}
          path: apps/astro-ssg-thin-slice/src/data/thin-slice.json
          if-no-files-found: error

  preview-deploy:
    runs-on: ubuntu-latest
    needs: contract-check
    if: ${{ github.event_name == 'pull_request' && needs.contract-check.outputs.preview_required == 'true' }}
    environment:
      name: astro-ssg-preview
    defaults:
      run:
        working-directory: apps/astro-ssg-thin-slice
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for Wrangler
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download validated dist artifact
        uses: actions/download-artifact@v4
        with:
          name: astro-ssg-dist-${{ github.sha }}
          path: apps/astro-ssg-thin-slice/dist

      - name: Assert Cloudflare preview config
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${CF_API_TOKEN}" ]; then
            echo "Missing required secret: CLOUDFLARE_API_TOKEN"
            missing=1
          fi
          if [ -z "${CF_ACCOUNT_ID}" ]; then
            echo "Missing required secret: CLOUDFLARE_ACCOUNT_ID"
            missing=1
          fi
          if [ -z "${CF_PROJECT_NAME}" ]; then
            echo "Missing required variable: CLOUDFLARE_PAGES_PROJECT"
            missing=1
          fi
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Preflight Cloudflare Pages access
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          set -euo pipefail
          echo "Configured project name: ${CF_PROJECT_NAME}"
          echo "Checking Pages project lookup under configured account..."
          npx wrangler@3.114.12 pages project list

      - name: Deploy preview to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
          CF_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          set +e
          DEPLOY_OUTPUT="$(npx wrangler@3.114.12 pages deploy dist --project-name=${CF_PROJECT_NAME} --branch=${CF_BRANCH} 2>&1)"
          DEPLOY_EXIT=$?
          set -e
          printf "%s\n" "${DEPLOY_OUTPUT}" | tee deploy-output.txt

          # Wrangler output may include ANSI control sequences; strip them before URL extraction.
          CLEAN_OUTPUT="$(printf "%s\n" "${DEPLOY_OUTPUT}" | sed -E 's/\x1B\\[[0-9;]*[A-Za-z]//g')"
          PREVIEW_URL="$(printf "%s\n" "${CLEAN_OUTPUT}" | rg -o 'https://[^[:space:]]+' | rg '\.pages\.dev/?$' | head -n 1 || true)"
          PREVIEW_ALIAS="$(printf "%s\n" "${CLEAN_OUTPUT}" | rg -o 'https://[^[:space:]]+' | rg '\.workers\.dev/?$' | head -n 1 || true)"

          # Fallback: query the latest preview deployment metadata if deploy output omitted URLs.
          if [ "${DEPLOY_EXIT}" -eq 0 ] && { [ -z "${PREVIEW_URL}" ] || [ -z "${PREVIEW_ALIAS}" ]; }; then
            DEPLOY_LIST_OUTPUT="$(npx wrangler@3.114.12 pages deployment list --project-name=${CF_PROJECT_NAME} --environment=preview 2>&1 || true)"
            printf "%s\n" "${DEPLOY_LIST_OUTPUT}" > deploy-list-output.txt
            CLEAN_LIST_OUTPUT="$(printf "%s\n" "${DEPLOY_LIST_OUTPUT}" | sed -E 's/\x1B\\[[0-9;]*[A-Za-z]//g')"

            if [ -z "${PREVIEW_URL}" ]; then
              PREVIEW_URL="$(printf "%s\n" "${CLEAN_LIST_OUTPUT}" | rg -o 'https://[^[:space:]]+' | rg '\.pages\.dev/?$' | head -n 1 || true)"
            fi

            if [ -z "${PREVIEW_ALIAS}" ]; then
              PREVIEW_ALIAS="$(printf "%s\n" "${CLEAN_LIST_OUTPUT}" | rg -o 'https://[^[:space:]]+' | rg '\.workers\.dev/?$' | head -n 1 || true)"
            fi
          fi

          {
            echo "preview_url=${PREVIEW_URL}"
            echo "preview_alias=${PREVIEW_ALIAS}"
            echo "sha=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "deploy_exit_code=${DEPLOY_EXIT}"
          } > deployment-evidence.txt

          if [ "${DEPLOY_EXIT}" -ne 0 ]; then
            exit "${DEPLOY_EXIT}"
          fi

      - name: Upload preview deployment debug output
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: astro-ssg-preview-debug-${{ github.sha }}
          path: |
            apps/astro-ssg-thin-slice/deploy-output.txt
            apps/astro-ssg-thin-slice/deploy-list-output.txt
          if-no-files-found: ignore

      - name: Upload preview deployment evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: astro-ssg-preview-evidence-${{ github.sha }}
          path: apps/astro-ssg-thin-slice/deployment-evidence.txt
          if-no-files-found: error

      - name: Publish preview summary
        run: |
          PREVIEW_URL="$(sed -n 's/^preview_url=//p' deployment-evidence.txt | head -n 1)"
          PREVIEW_ALIAS="$(sed -n 's/^preview_alias=//p' deployment-evidence.txt | head -n 1)"
          DEPLOY_EXIT_CODE="$(sed -n 's/^deploy_exit_code=//p' deployment-evidence.txt | head -n 1)"
          {
            echo "## Astro SSG Preview Deployment"
            echo ""
            echo "- Preview URL: ${PREVIEW_URL}"
            echo "- Preview Alias: ${PREVIEW_ALIAS}"
            echo "- Source SHA: ${GITHUB_SHA}"
            echo "- Deploy Exit Code: ${DEPLOY_EXIT_CODE}"
          } >> "$GITHUB_STEP_SUMMARY"
